version: "3.9"

services:
  oracle:
    build:
      context: .
      args:
        SENTENCE_TRANSFORMERS_MODEL: ${SENTENCE_TRANSFORMERS_MODEL:-all-mpnet-base-v2}
    ports:
      - "${MCP_PORT:-8080}:${MCP_PORT:-8080}"
      - "${STREAMLIT_SERVER_PORT:-8501}:${STREAMLIT_SERVER_PORT:-8501}"
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      NEO4J_USERNAME: ${NEO4J_USERNAME:-neo4j}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      MODEL_PROVIDER: ${MODEL_PROVIDER:-anthropic}
      MODEL_ID: ${MODEL_ID:-}
      MCP_PORT: ${MCP_PORT:-8080}
      STREAMLIT_SERVER_PORT: ${STREAMLIT_SERVER_PORT:-8501}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      GITLAB_API_KEY: ${GITLAB_API_KEY:-}
      FINDIT_AUTH_TOKEN: ${FINDIT_AUTH_TOKEN:-}
      FINDIT_BASE_URL: ${FINDIT_BASE_URL:-https://findit-api.icd.paysafe.cloud}
    volumes:
      - oracle-data:/data
    depends_on:
      neo4j:
        condition: service_healthy
    restart: "no"

  neo4j:
    image: neo4j:5
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD}
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j-data:/data
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "${NEO4J_PASSWORD}", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  oracle-data:
  neo4j-data:
